version: "3.8"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://rfq_user:simplepass123@db:5432/rfq_platform
      - STRIPE_SECRET_KEY=your_stripe_secret_key
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=rfq_platform
      - POSTGRES_USER=rfq_user
      - POSTGRES_PASSWORD=simplepass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
