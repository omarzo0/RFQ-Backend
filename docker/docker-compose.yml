version: "3.8"
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Server Configuration
      - NODE_ENV=production
      - PORT=3000
      - API_VERSION=v1
      
      # Database Configuration (use 'db' as hostname in Docker network)
      - DATABASE_URL=postgresql://rfq_user:simplepass123@db:5432/rfq_platform
      - DATABASE_POOL_MIN=5
      - DATABASE_POOL_MAX=100
      
      # Redis Configuration
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      
      # JWT Authentication
      - JWT_SECRET=your-super-secret-jwt-key-minimum-32-characters-long-change-this-in-production
      - JWT_EXPIRES_IN=720m
      - REFRESH_TOKEN_SECRET=your-refresh-token-secret-minimum-32-characters-long-change-this-too
      - REFRESH_TOKEN_EXPIRES_IN=7d
      
      # Email Configuration
      - EMAIL_HOST=smtp-relay.brevo.com
      - EMAIL_PORT=587
      - EMAIL_SECURE=false
      - EMAIL_USER=9b40a8001@smtp-brevo.com
      - EMAIL_PASSWORD=dBYj6h8CGAvUSMTq
      - EMAIL_FROM_NAME=RFQ
      - EMAIL_FROM_ADDRESS=omarkhaledd007@gmail.com
      
      # File Storage
      - STORAGE_PROVIDER=local
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=10485760
      
      # Payment Processing (Stripe)
      - STRIPE_SECRET_KEY=sk_test_51SU69WDiyGMBk4eiQSuDE25aHqn0nKzb6yMVrNo7SGU4sAYyfC9U0OxY6mUX42vr9KIebe6sFlGZaZIQXKAnoOa800prfr3gV7
      - STRIPE_PUBLISHABLE_KEY=pk_test_51SU69WDiyGMBk4eivAFAprPhyrzTJA9PraK2TrZlFKlZXZ72fi5idfh953x6mWeI4oiHJp0NYRIC6PCLGev3NWcl00gIgMAyAY
      - STRIPE_WEBHOOK_SECRET=whsec_wRNftLajMZNeslQOP6vEPm4iVx5NlZ6z
      
      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=1000
      
      # CORS Origins
      - CORS_ORIGINS=http://localhost:3001,https://yourdomain.com
      
      # Logging
      - LOG_LEVEL=info
      - LOG_FILE=logs/app.log
      
      # Feature Flags
      - ENABLE_AI_PARSING=false
      - ENABLE_WEBHOOKS=true
      - ENABLE_ANALYTICS=true
      
      # Seeding
      - SUPER_ADMIN_EMAIL=omarkhaled202080@gmail.com
      - SUPER_ADMIN_PASSWORD=564712Omar@@!!
      - COMPANY_EMAIL=uomarkhaled202080@gmail.com
      - COMPANY_PASSWORD=564712Omar@@!!
      
      # Mock Email
      - MOCK_EMAIL_PROVIDER=false
      
      # AI Services
      - OPENAI_API_KEY=your-openai-key
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=rfq_platform
      - POSTGRES_USER=rfq_user
      - POSTGRES_PASSWORD=simplepass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfq_user -d rfq_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
